<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;700;900&family=Rajdhani:wght@600;700&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: #0f0c1a;
    font-family: 'Noto Sans KR', sans-serif;
    padding: 40px;
    width: 1100px;
  }

  .container {
    background: linear-gradient(160deg, #1a1030 0%, #0f0c1a 50%, #0c1525 100%);
    border: 1px solid rgba(180,130,255,0.2);
    border-radius: 20px;
    padding: 36px 40px 44px;
    position: relative;
    overflow: hidden;
  }

  .container::before {
    content: '';
    position: absolute;
    top: -80px; right: -80px;
    width: 300px; height: 300px;
    background: radial-gradient(circle, rgba(130,80,255,0.15) 0%, transparent 70%);
    pointer-events: none;
  }
  .container::after {
    content: '';
    position: absolute;
    bottom: -60px; left: -60px;
    width: 250px; height: 250px;
    background: radial-gradient(circle, rgba(60,160,255,0.1) 0%, transparent 70%);
    pointer-events: none;
  }

  .header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 28px;
    padding-bottom: 20px;
    border-bottom: 1px solid rgba(180,130,255,0.2);
  }

  .guild-name {
    font-family: 'Rajdhani', sans-serif;
    font-size: 52px;
    font-weight: 700;
    letter-spacing: 8px;
    background: linear-gradient(135deg, #c084fc, #818cf8, #38bdf8);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
  }

  .header-right { text-align: right; }

  .event-label {
    font-size: 14px;
    color: rgba(200,180,255,0.6);
    letter-spacing: 2px;
    text-transform: uppercase;
    margin-bottom: 8px;
  }

  .update-time {
    font-size: 14px;
    color: rgba(200,180,255,0.7);
  }

  .update-time span {
    color: #c4b5fd;
    font-weight: 700;
    font-size: 15px;
  }

  .rule-box {
    background: rgba(255,200,80,0.07);
    border: 1px solid rgba(255,200,80,0.25);
    border-radius: 10px;
    padding: 13px 20px;
    margin-bottom: 26px;
    font-size: 15px;
    color: #fcd34d;
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .grid {
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    gap: 9px;
  }

  .row {
    display: flex;
    align-items: center;
    background: rgba(255,255,255,0.03);
    border: 1px solid rgba(255,255,255,0.06);
    border-radius: 10px;
    padding: 11px 14px;
    gap: 10px;
    min-width: 0;
  }

  .row.top3 {
    background: rgba(180,130,255,0.1);
    border-color: rgba(180,130,255,0.25);
  }

  .row.zero {
    background: rgba(255,80,80,0.05);
    border-color: rgba(255,80,80,0.15);
  }

  .no {
    font-family: 'Rajdhani', sans-serif;
    font-size: 13px;
    font-weight: 600;
    color: rgba(200,180,255,0.35);
    width: 22px;
    text-align: right;
    flex-shrink: 0;
  }

  .rank {
    font-family: 'Rajdhani', sans-serif;
    font-size: 14px;
    font-weight: 700;
    color: rgba(200,180,255,0.5);
    width: 38px;
    text-align: center;
    flex-shrink: 0;
  }

  .rank.r2 { color: #94a3b8; }
  .rank.r3 { color: #cd7c3a; }

  .name {
    flex: 1;
    font-size: 16px;
    font-weight: 700;
    color: #e2d9f3;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    min-width: 0;
  }

  .score {
    font-family: 'Rajdhani', sans-serif;
    font-size: 18px;
    font-weight: 700;
    color: #a78bfa;
    text-align: right;
    flex-shrink: 0;
    min-width: 58px;
  }

  .score.high { color: #34d399; }
  .score.zero-score { color: rgba(255,100,100,0.6); }

  .updated {
    font-size: 11px;
    color: rgba(180,160,255,0.5);
    flex-shrink: 0;
    white-space: nowrap;
    width: 62px;
    text-align: right;
  }

  .footer {
    margin-top: 24px;
    padding-top: 16px;
    border-top: 1px solid rgba(180,130,255,0.15);
    display: flex;
    justify-content: space-between;
    align-items: center;
  }

  .total {
    font-size: 14px;
    color: rgba(200,180,255,0.45);
  }

  .total strong {
    color: rgba(200,180,255,0.8);
    font-family: 'Rajdhani', sans-serif;
    font-size: 17px;
  }

  .goal-note {
    font-size: 14px;
    color: rgba(252,211,77,0.6);
  }
</style>
